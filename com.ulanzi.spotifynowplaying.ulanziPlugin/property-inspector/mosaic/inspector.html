<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../libs/css/uspi.css" />
  <link rel="stylesheet" href="../authPanel.css" />
  <script src="../../libs/js/constants.js"></script>
  <script src="../../libs/js/eventEmitter.js"></script>
  <script src="../../libs/js/timers.js"></script>
  <script src="../../libs/js/utils.js"></script>
  <script src="../../libs/js/ulanziApi.js"></script>
</head>
<body>
  <div class="uspi-wrapper">
    <form id="property-inspector">
      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Quadrante</div>
        <select class="uspi-item-value" name="quadrant" id="quadrant">
          <option value="0" data-localize>Superior esquerdo</option>
          <option value="1" data-localize>Superior direito</option>
          <option value="2" data-localize>Inferior esquerdo</option>
          <option value="3" data-localize>Inferior direito</option>
        </select>
      </div>
      <p class="auth-hint" data-localize>
        Coloque as 4 ações (um quadrante cada) em teclas 2×2 adjacentes para formar a capa completa.
      </p>
    </form>

    <hr />

    <!-- Painel de conexão com o Spotify -->
    <div class="uspi-item">
      <div class="uspi-item-label" data-localize>Client ID do Spotify</div>
      <input type="text" class="uspi-item-value" id="clientId" placeholder="xxxxxxxxxxxx" />
    </div>
    <p class="auth-hint">
      <span data-localize>Redirect URI (registre no app do Spotify):</span>
      <br /><code id="redirectUri">http://127.0.0.1:8888/callback</code>
    </p>
    <div class="auth-buttons">
      <button type="button" class="uspi-btn" id="btnConnect" data-localize>Conectar ao Spotify</button>
      <button type="button" class="uspi-btn" id="btnLogout" style="display:none" data-localize>Sair</button>
    </div>
    <div class="auth-status" id="authStatus"></div>
  </div>

  <script src="../authPanel.js"></script>
  <script>
    $UD.connect('com.ulanzi.ulanzistudio.spotifynowplaying.mosaic');

    $UD.onAdd((message) => {
      Utils.setFormValue(message.param, '#property-inspector');
    });

    document.getElementById('property-inspector').addEventListener('change', () => {
      const params = Utils.getFormValue('#property-inspector');
      $UD.sendParamFromPlugin(params);
    });

    initAuthPanel();
  </script>
</body>
</html>
